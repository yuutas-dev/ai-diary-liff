<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AIお礼日記メーカー</title>
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #A855F7, #EC4899);
      --bg-color: #F4F2F7; --card-bg: #FFFFFF; --text-main: #4B3E41; --text-sub: #9E8E92;
      --input-bg: #F8F4F6; --border-color: #EFEAF0; --active-color: #D946EF;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --shadow-md: 0 6px 20px rgba(200, 180, 190, 0.2);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-color); color: var(--text-main); font-family: 'Hiragino Maru Gothic ProN', sans-serif; -webkit-tap-highlight-color: transparent; }
    input[type="radio"].ui-state { display: none; }

    /* ナビゲーション・基本レイアウト */
    .page { display: none; flex-direction: column; padding-bottom: 20px; }
    #nav-create:checked ~ .app-container .page-create { display: flex; }
    #nav-data:checked ~ .app-container .page-data { display: flex; }
    #nav-settings:checked ~ .app-container .page-settings { display: flex; }
    #nav-create:checked ~ .app-container .tab-create, #nav-data:checked ~ .app-container .tab-data, #nav-settings:checked ~ .app-container .tab-settings { color: var(--active-color); }
    #nav-create:not(:checked) ~ .app-container .header-toggle, #nav-create:not(:checked) ~ .app-container .submit-area { display: none; }

    .app-container { display: flex; flex-direction: column; height: 100dvh; position: relative; }
    .header-area { padding: env(safe-area-inset-top, 20px) 16px 10px; background: rgba(244, 242, 247, 0.85); backdrop-filter: blur(12px); z-index: 100; flex-shrink: 0; }
    .app-title { text-align: center; font-size: 22px; font-weight: 900; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    .toggle-container { display: flex; background: #EAE5ED; border-radius: 40px; padding: 4px; }
    .toggle-label { flex: 1; text-align: center; padding: 12px; font-size: 15px; font-weight: 900; color: var(--text-sub); border-radius: 34px; transition: 0.3s; cursor: pointer; }
    .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 16px calc(env(safe-area-inset-bottom, 20px) + 160px); }
    
    /* モード切り替え */
    .mode-photo-ui { display: none; }
    #mode-photo:checked ~ .app-container .mode-photo-ui { display: block; }
    #mode-photo:checked ~ .app-container .toggle-photo { background: var(--card-bg); color: var(--active-color); box-shadow: var(--shadow-sm); }
    #mode-text:checked ~ .app-container .toggle-text { background: var(--card-bg); color: var(--active-color); box-shadow: var(--shadow-sm); }

    /* カード・UIパーツ */
    .card { background: var(--card-bg); border-radius: 20px; padding: 22px 20px; margin-bottom: 20px; box-shadow: var(--shadow-md); }
    .label { font-weight: 900; font-size: 16px; margin-bottom: 12px; display: block; color: var(--text-main); }
    .input-field { width: 100%; background: var(--input-bg); border: 2px solid transparent; border-radius: 16px; padding: 16px; font-size: 16px; color: var(--text-main); font-family: inherit; transition: 0.2s; }

    /* 顧客アイコン横スワイプ */
    .fade-scroll-wrapper { position: relative; width: 100%; margin-bottom: 12px; }
    .fade-scroll-wrapper::after { content: ""; position: absolute; top: 0; right: 0; width: 40px; height: 100%; background: linear-gradient(to right, transparent, var(--card-bg)); pointer-events: none; }
    .stories-scroll { display: flex; gap: 16px; overflow-x: auto; padding: 10px 40px 10px 0; scrollbar-width: none; }
    .stories-scroll::-webkit-scrollbar { display: none; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; width: 66px; position: relative; }
    .story-ring { width: 66px; height: 66px; border-radius: 50%; background: var(--primary-gradient); padding: 3px; position: relative; }
    .story-inner { width: 100%; height: 100%; border-radius: 50%; background: #FFF; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: var(--active-color); border: 2px solid #FFF; }
    .story-badge { position: absolute; top: -5px; right: -5px; background: #DB2777; color: #FFF; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 10px; border: 1.5px solid #FFF; z-index: 5; }

    /* 【NEW】選択済みエピソードタグ表示エリア */
    .selected-tags-box { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 30px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; }
    .selected-chip { background: var(--primary-gradient); color: #FFF; padding: 6px 12px; border-radius: 14px; font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 4px; animation: pop 0.2s ease-out; }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* エピソードタグ（多段・動的） */
    .episode-tags-container { display: flex; flex-wrap: wrap; gap: 8px; max-height: 140px; overflow-y: auto; padding: 4px 0; }
    .chip { background: #FFF; border: 1px solid #E5E7EB; color: #4F46E5; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 900; cursor: pointer; transition: 0.2s; }
    .chip.dimmed { opacity: 0.3; background: #F3F4F6; color: #9CA3AF; border-color: transparent; pointer-events: none; }

    /* 属性タグ（顧客用） */
    .attr-chip { background: #FDF2F8; border: 1px solid #FBCFE8; color: #DB2777; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 900; flex-shrink: 0; }
    .edit-attr-chip { padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 900; cursor: pointer; transition: 0.1s; border: 1px solid #FBCFE8; }

    /* 送信・ナビ */
    .submit-area { background: linear-gradient(to bottom, rgba(244,242,247,0), var(--bg-color) 40%); padding: 30px 16px 16px; pointer-events: auto; }
    .submit-btn { width: 100%; background: var(--primary-gradient); color: #FFF; border: none; padding: 20px; font-size: 18px; font-weight: 900; border-radius: 35px; box-shadow: 0 8px 24px rgba(236, 72, 153, 0.4); cursor: pointer; }
    .bottom-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 calc(env(safe-area-inset-bottom, 12px) + 6px); border-top: 1px solid var(--border-color); pointer-events: auto; }
    .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #BDB2B5; font-size: 11px; font-weight: 900; gap: 4px; flex: 1; cursor: pointer; }
    
    /* モーダル */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
    .modal-content { background: #FFF; border-radius: 24px; padding: 30px 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
  </style>
</head>
<body>

  <input type="radio" name="nav" id="nav-create" class="ui-state" checked>
  <input type="radio" name="nav" id="nav-data" class="ui-state">
  <input type="radio" name="nav" id="nav-settings" class="ui-state">
  <input type="radio" name="mode" id="mode-text" class="ui-state" checked onchange="updateChips()">
  <input type="radio" name="mode" id="mode-photo" class="ui-state" onchange="updateChips()">

  <!-- 顧客編集モーダル -->
  <div id="editCustomerModal" class="modal-overlay">
    <div class="modal-content">
      <h2 style="margin: 0 0 20px; font-weight: 900; text-align: center;">顧客情報の編集</h2>
      <input type="hidden" id="editCustomerIndex">
      
      <span class="label" style="font-size:14px;">名前</span>
      <input type="text" id="editCustomerName" class="input-field" style="margin-bottom: 16px;">
      
      <span class="label" style="font-size:14px;">属性タグ（タップで選択 / 自由追加）</span>
      <div id="editAttributeTagsArea" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;"></div>
      
      <div style="display:flex; gap:8px; margin-bottom:20px;">
        <input type="text" id="newAttrInput" class="input-field" placeholder="自由タグ追加..." style="padding:10px; font-size:13px;">
        <button onclick="addNewAttribute()" style="background:var(--active-color); color:#FFF; border:none; border-radius:12px; padding:0 15px; font-weight:bold;">追加</button>
      </div>

      <span class="label" style="font-size:14px;">メモ</span>
      <textarea id="editCustomerMemo" class="input-field" style="height: 100px; margin-bottom: 24px;"></textarea>
      
      <div style="display:flex; gap:10px;">
        <button onclick="closeEditModal()" style="flex:1; background:#EAE5ED; color:var(--text-main); border:none; padding:16px; border-radius:30px; font-weight:900;">キャンセル</button>
        <button onclick="saveCustomerEdit()" id="saveCustomerBtn" style="flex:1; background:var(--primary-gradient); color:#FFF; border:none; padding:16px; border-radius:30px; font-weight:900;">保存する</button>
      </div>
    </div>
  </div>

  <div class="app-container">
    <header class="header-area">
      <div class="app-title">AIお礼日記メーカー</div>
      <div class="toggle-container header-toggle">
        <label for="mode-text" class="toggle-label toggle-text">💌 お礼日記</label>
        <label for="mode-photo" class="toggle-label toggle-photo">📸 写メ日記</label>
      </div>
    </header>

    <main class="scroll-area">
      <div class="page page-create">
        <div class="card">
          <span class="label">👤 誰に送る？</span>
          <div class="fade-scroll-wrapper"><div class="stories-scroll" id="quickAccessArea"></div></div>
          <input type="text" id="nameInput" class="input-field" placeholder="名前を入力..." oninput="suggestCustomer()">
          <div id="resultArea" style="display:none;" class="card"></div>
        </div>

        <div class="card mode-photo-ui">
          <span class="label">📷 写真を選ぶ</span>
          <input type="file" id="photoUpload" accept="image/*" style="display:none;" onchange="previewPhoto(event)">
          <label for="photoUpload" id="uploadArea" class="card" style="text-align:center; border:2px dashed #DDD; cursor:pointer;">
            <div id="uploadText">📸 タップしてアップロード</div>
            <img id="photoPreview" style="width:100%; display:none; border-radius:12px;">
          </label>
        </div>

        <div class="card">
          <span class="label">📝 本日の内容</span>
          
          <!-- 選択した属性タグ（見るだけ） -->
          <div id="attributeTagsWrapper" class="fade-scroll-wrapper" style="display:none;"><div class="tags-scroll-container" id="attributeTagsArea"></div></div>

          <!-- 【Idea ①】選択済みエピソードタグ -->
          <div id="selectedEpisodeTags" class="selected-tags-box"></div>

          <div class="textarea-wrapper">
            <textarea id="episodeInput" class="input-field" oninput="autoScrollTextarea()"></textarea>
            <div class="mic-btn" onclick="startDictation()">🎤</div>
          </div>
          
          <div class="episode-tags-container" id="dynamicChips"></div>
        </div>
      </div>

      <div class="page page-data">
        <h2 style="margin:0 0 20px; font-weight:900;">顧客カルテ</h2>
        <input type="text" id="customerSearch" class="input-field" placeholder="名前で検索..." oninput="renderCustomerList(this.value)" style="margin-bottom:16px;">
        <div id="customerListArea"></div>
      </div>
    </main>

    <footer class="fixed-footer">
      <div class="submit-area"><button class="submit-btn" id="submitBtn" onclick="generateDiary()">✨ AIで作成する</button></div>
      <nav class="bottom-nav">
        <label for="nav-create" class="nav-item tab-create">📝作成</label>
        <label for="nav-data" class="nav-item tab-data">📖顧客</label>
      </nav>
    </footer>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = "2009843865-hghVLuaS";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyWcx1XN8MuLsscHjoi9DdItYm7jCsMdZvNgrohG0o51KlTEheIXVdrHbSmGeSS2FV2/exec";

    let userId = "test-user";
    let customerData = [];
    let currentCustomerTags = []; 
    let selectedEpisodeTags = []; // 現在のセッションで選択されたタグ
    let currentBase64Image = null;

    const presetAttributeTags = ['太客', '常連', '新規', '痛客', 'デブ', 'ハゲ', '金持ち', 'ケチ', 'お酒好き', '下戸', '既婚', '独身', '優しい', 'M気質', 'S気質'];
    let tempSelectedAttributes = []; // 編集モーダル用一時配列

    const industryConfigs = {
      cabaret: { tags: ['✨ 本指名', '🥂 同伴', '🍾 シャンパン', '💕 祝・開店', '🥺 会いたい', '👗 ドレス', '🍷 ワイン', '🎤 カラオケ', '🤫 秘密の話', '💖 感謝'] },
      fuzoku: { tags: ['✨ 本指名', '🏩 ロング', '🔞 濃厚', '🧸 癒やし', '💋 キス', '🚿 シャワー', '🥺 寂しい', '🛀 お風呂', '🧴 オイル', '💖 大好き'] }
    };

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) { userId = (await liff.getProfile()).userId; }
      } catch (e) {}
      fetchCustomers();
      updateChips();
    }
    window.onload = init;

    // --- エピソードタグ（Idea ① 刷新） ---
    function updateChips() {
      const type = localStorage.getItem('businessType') || 'cabaret';
      const isPhoto = document.getElementById('mode-photo').checked;
      const tags = isPhoto ? ['📸 日常', '💄 出勤前', '👙 えちえち', '🥱 待機中', '👗 新衣装'] : industryConfigs[type].tags;
      
      const container = document.getElementById('dynamicChips');
      container.innerHTML = '';
      tags.forEach(tag => {
        const isSelected = selectedEpisodeTags.includes(tag);
        const div = document.createElement('div');
        div.className = `chip ${isSelected ? 'dimmed' : ''}`;
        div.innerText = tag;
        div.onclick = () => selectEpisodeTag(tag);
        container.appendChild(div);
      });
    }

    function selectEpisodeTag(tag) {
      if (!selectedEpisodeTags.includes(tag)) {
        selectedEpisodeTags.push(tag);
        renderSelectedEpisodeTags();
        updateChips();
      }
    }

    function renderSelectedEpisodeTags() {
      const area = document.getElementById('selectedEpisodeTags');
      area.innerHTML = '';
      selectedEpisodeTags.forEach((tag, index) => {
        const div = document.createElement('div');
        div.className = 'selected-chip';
        div.innerHTML = `${tag} <span onclick="removeEpisodeTag(${index})" style="margin-left:4px;">×</span>`;
        area.appendChild(div);
      });
    }

    function removeEpisodeTag(index) {
      selectedEpisodeTags.splice(index, 1);
      renderSelectedEpisodeTags();
      updateChips();
    }

    function autoScrollTextarea() {
      const el = document.getElementById('episodeInput');
      el.scrollTop = el.scrollHeight;
    }

    // --- 顧客データ関連 ---
    async function fetchCustomers() {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getCustomers", userId: userId }) });
      const data = await res.json();
      customerData = data.success ? data.customers.map(c => ({
        ...c, name: String(c.name || ""), tagsArray: c.tags ? String(c.tags).split(',').map(t => t.trim()).filter(t => t) : []
      })) : [];
      renderCustomerList();
      renderQuickAccess();
    }

    function renderQuickAccess() {
      const area = document.getElementById('quickAccessArea');
      area.innerHTML = "";
      customerData.slice(0, 15).forEach((c, index) => {
        const badge = c.tagsArray[0] ? `<div class="story-badge">${c.tagsArray[0]}</div>` : '';
        area.innerHTML += `<div class="story-item" onclick="selectCustomerByIndex(${index})"><div class="story-ring">${badge}<div class="story-inner">${String(c.name).charAt(0)}</div></div><span class="story-name">${c.name}</span></div>`;
      });
    }

    function selectCustomerByIndex(index) {
      const c = customerData[index];
      document.getElementById('nav-create').checked = true;
      document.getElementById('nameInput').value = c.name;
      document.getElementById('episodeInput').value = c.memo ? `[接客メモ: ${c.memo}]\n` : "";
      currentCustomerTags = c.tagsArray;
      renderAttributeTags();
      selectedEpisodeTags = []; // タグ選択をリセット
      renderSelectedEpisodeTags();
      updateChips();
    }

    function renderAttributeTags() {
      const wrapper = document.getElementById('attributeTagsWrapper');
      const area = document.getElementById('attributeTagsArea');
      area.innerHTML = currentCustomerTags.map(t => `<div class="attr-chip">#${t}</div>`).join('');
      wrapper.style.display = currentCustomerTags.length ? 'block' : 'none';
    }

    // --- 顧客編集・属性タグ自由追加 ---
    function openEditModal(index) {
      const c = customerData[index];
      document.getElementById('editCustomerIndex').value = index;
      document.getElementById('editCustomerName').value = c.name;
      document.getElementById('editCustomerMemo').value = c.memo;
      tempSelectedAttributes = [...c.tagsArray];
      editingOriginalName = c.name;
      renderEditAttributeTags();
      document.getElementById('editCustomerModal').style.display = 'flex';
    }

    function renderEditAttributeTags() {
      const area = document.getElementById('editAttributeTagsArea');
      area.innerHTML = '';
      
      // プリセット + その顧客だけのオリジナルタグを結合
      const allTags = Array.from(new Set([...presetAttributeTags, ...tempSelectedAttributes]));
      
      allTags.forEach(tag => {
        const isSelected = tempSelectedAttributes.includes(tag);
        const div = document.createElement('div');
        div.className = 'edit-attr-chip';
        div.style.background = isSelected ? '#DB2777' : '#FFF';
        div.style.color = isSelected ? '#FFF' : '#DB2777';
        div.innerText = `#${tag}`;
        div.onclick = () => {
          if(isSelected) tempSelectedAttributes = tempSelectedAttributes.filter(t => t !== tag);
          else tempSelectedAttributes.push(tag);
          renderEditAttributeTags();
        };
        area.appendChild(div);
      });
    }

    function addNewAttribute() {
      const input = document.getElementById('newAttrInput');
      const val = input.value.trim();
      if(val && !tempSelectedAttributes.includes(val)) {
        tempSelectedAttributes.push(val);
        input.value = '';
        renderEditAttributeTags();
      }
    }

    async function saveCustomerEdit() {
      const index = document.getElementById('editCustomerIndex').value;
      const payload = {
        action: "updateCustomer", userId: userId, oldName: editingOriginalName,
        newName: document.getElementById('editCustomerName').value,
        newTags: tempSelectedAttributes.join(','),
        newMemo: document.getElementById('editCustomerMemo').value
      };
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
      if((await res.json()).success) { fetchCustomers(); closeEditModal(); }
    }

    function closeEditModal() { document.getElementById('editCustomerModal').style.display = 'none'; }

    // --- 日記生成 ---
    async function generateDiary() {
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('nameInput').value;
      const episode = document.getElementById('episodeInput').value;
      if(!name || !episode) return alert("名前とエピソードを入れてね");

      btn.innerText = "作成中...🚀"; btn.disabled = true;

      const payload = {
        action: "generate", userId: userId, name: name, episode: episode,
        customerTags: currentCustomerTags.join(', '), // 顧客属性
        episodeTags: selectedEpisodeTags.join(', '),  // 今日のエピソードタグ
        style: document.querySelector('input[name="style"]:checked')?.id?.replace('style-','') || "cute"
      };

      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
      if((await res.json()).success) {
        alert("送信完了！");
        location.reload(); // リセット
      }
      btn.innerText = "✨ AIで作成する"; btn.disabled = false;
    }

    function renderCustomerList(filter = "") {
      const area = document.getElementById('customerListArea');
      area.innerHTML = customerData.filter(c => c.name.includes(filter)).map((c, i) => `
        <div class="card" style="display:flex; justify-content:space-between;">
          <div><b>${c.name}</b><br><small>${c.memo || ""}</small></div>
          <button onclick="selectCustomerByIndex(${customerData.indexOf(c)})" style="background:#FCE7F3; color:#DB2777; border:none; padding:8px; border-radius:8px;">作成</button>
          <button onclick="openEditModal(${customerData.indexOf(c)})" style="background:#EEE; border:none; padding:8px; border-radius:8px;">編集</button>
        </div>
      `).join('');
    }
    
    function suggestCustomer() {
      const text = document.getElementById('nameInput').value;
      if(!text) { document.getElementById('resultArea').style.display='none'; return; }
      renderCustomerList(text);
    }
  </script>
</body>
</html>
