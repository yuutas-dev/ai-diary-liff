<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AIお礼日記メーカー</title>
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #A855F7, #EC4899);
      --bg-color: #F4F2F7; --card-bg: #FFFFFF; --text-main: #4B3E41; --text-sub: #9E8E92;
      --input-bg: #F8F4F6; --border-color: #EFEAF0; --active-color: #D946EF;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --shadow-md: 0 6px 20px rgba(200, 180, 190, 0.2);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-color); color: var(--text-main); font-family: 'Hiragino Maru Gothic ProN', sans-serif; -webkit-tap-highlight-color: transparent; }
    input[type="radio"].ui-state { display: none; }

    /* ナビゲーション */
    .page { display: none; flex-direction: column; padding-bottom: 20px; }
    #nav-create:checked ~ .app-container .page-create { display: flex; }
    #nav-data:checked ~ .app-container .page-data { display: flex; }
    #nav-settings:checked ~ .app-container .page-settings { display: flex; }
    #nav-create:checked ~ .app-container .tab-create, #nav-data:checked ~ .app-container .tab-data, #nav-settings:checked ~ .app-container .tab-settings { color: var(--active-color); }
    #nav-create:not(:checked) ~ .app-container .header-toggle, #nav-create:not(:checked) ~ .app-container .submit-area { display: none; }

    /* モード・スタイル切り替えUI */
    .mode-photo-ui, .mode-text-ui { display: none; }
    #mode-photo:checked ~ .app-container .mode-photo-ui { display: block; }
    #mode-text:checked ~ .app-container .mode-text-ui { display: block; }
    #mode-photo:checked ~ .app-container .toggle-photo { background: var(--card-bg); color: var(--active-color); box-shadow: var(--shadow-sm); }
    #mode-text:checked ~ .app-container .toggle-text { background: var(--card-bg); color: var(--active-color); box-shadow: var(--shadow-sm); }
    #mode-photo:checked ~ .app-container .customer-select-card { display: none; }

    .style-desc-cute, .style-desc-custom, .style-desc-neat { display: none; }
    #style-cute:checked ~ .modal-overlay .style-desc-cute, #style-cute:checked ~ .app-container .style-desc-cute { display: block; }
    #style-custom:checked ~ .modal-overlay .style-desc-custom, #style-custom:checked ~ .app-container .style-desc-custom { display: block; }
    #style-neat:checked ~ .modal-overlay .style-desc-neat, #style-neat:checked ~ .app-container .style-desc-neat { display: block; }
    #style-cute:checked ~ .modal-overlay .btn-cute, #style-cute:checked ~ .app-container .btn-cute { background: var(--primary-gradient); color: white; border-color: transparent; }
    #style-custom:checked ~ .modal-overlay .btn-custom, #style-custom:checked ~ .app-container .btn-custom { background: var(--primary-gradient); color: white; border-color: transparent; }
    #style-neat:checked ~ .modal-overlay .btn-neat, #style-neat:checked ~ .app-container .btn-neat { background: var(--primary-gradient); color: white; border-color: transparent; }

    /* レイアウト */
    .app-container { display: flex; flex-direction: column; height: 100dvh; position: relative; }
    .header-area { padding: env(safe-area-inset-top, 20px) 16px 10px; background: rgba(244, 242, 247, 0.85); backdrop-filter: blur(12px); z-index: 100; flex-shrink: 0; }
    .app-title { text-align: center; font-size: 22px; font-weight: 900; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    .toggle-container { display: flex; background: #EAE5ED; border-radius: 40px; padding: 4px; }
    .toggle-label { flex: 1; text-align: center; padding: 12px; font-size: 15px; font-weight: 900; color: var(--text-sub); border-radius: 34px; transition: 0.3s; cursor: pointer; }
    .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 16px calc(env(safe-area-inset-bottom, 20px) + 160px); }
    .fixed-footer { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 200; display: flex; flex-direction: column; pointer-events: none; }
    .submit-area { background: linear-gradient(to bottom, rgba(244,242,247,0), var(--bg-color) 40%); padding: 30px 16px 16px; pointer-events: auto; }
    .submit-btn { width: 100%; background: var(--primary-gradient); color: #FFF; border: none; padding: 20px; font-size: 18px; font-weight: 900; border-radius: 35px; box-shadow: 0 8px 24px rgba(236, 72, 153, 0.4); cursor: pointer; transition: 0.2s; }
    .submit-btn:disabled { background: #E5E7EB; box-shadow: none; color: #9CA3AF; cursor: not-allowed; }
    .bottom-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 calc(env(safe-area-inset-bottom, 12px) + 6px); border-top: 1px solid var(--border-color); pointer-events: auto; }
    .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #BDB2B5; font-size: 11px; font-weight: 900; gap: 4px; flex: 1; cursor: pointer; }
    .nav-icon { font-size: 26px; }

    /* カード・UIパーツ */
    .card { background: var(--card-bg); border-radius: 20px; padding: 22px 20px; margin-bottom: 20px; box-shadow: var(--shadow-md); }
    .label { font-weight: 900; font-size: 16px; margin-bottom: 12px; display: block; color: var(--text-main); }
    .input-field { width: 100%; background: var(--input-bg); border: 2px solid transparent; border-radius: 16px; padding: 16px; font-size: 16px; color: var(--text-main); font-family: inherit; transition: 0.2s; }
    .input-field:focus { background: #FFF; border-color: #F472B6; outline: none; }
    .stories-scroll { display: flex; gap: 16px; overflow-x: auto; padding: 5px 0 10px; scrollbar-width: none; }
    .stories-scroll::-webkit-scrollbar { display: none; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; width: 66px; position: relative; }
    .story-ring { width: 66px; height: 66px; border-radius: 50%; background: var(--primary-gradient); padding: 3px; }
    .story-inner { width: 100%; height: 100%; border-radius: 50%; background: #FFF; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: var(--active-color); border: 2px solid #FFF; }
    .story-name { font-size: 11px; font-weight: bold; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
    .story-tag { position: absolute; top: -4px; left: -4px; background: #DB2777; color: #FFF; font-size: 9px; font-weight: bold; padding: 2px 4px; border-radius: 6px; z-index: 5; }

    .result-box { display: none; background: #FFF; border: 1px solid var(--border-color); border-radius: 12px; margin-top: 8px; padding: 8px; box-shadow: var(--shadow-sm); max-height: 150px; overflow-y: auto; }
    .suggest-item { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 15px; font-weight: bold; cursor: pointer; }
    .textarea-wrapper { position: relative; }
    textarea.input-field { height: 140px; resize: none; padding-right: 50px; line-height: 1.6; }
    .mic-btn { position: absolute; bottom: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; background: #FFF; border: 1px solid #FBCFE8; box-shadow: 0 4px 12px rgba(236, 72, 153, 0.15); display: flex; justify-content: center; align-items: center; font-size: 22px; cursor: pointer; color: #EC4899; }
    .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; align-items: center; }
    .chip { background: #FFF; border: 1px solid #F0E6EA; color: #9333EA; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .upload-area { border: 2px dashed #D1C5D4; background: #FAF8FB; border-radius: 16px; min-height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--text-sub); font-weight: bold; cursor: pointer; position: relative; overflow: hidden; }
    .upload-area img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
    .modal-content { background: #FFF; border-radius: 24px; padding: 30px 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .style-selector { display: flex; gap: 8px; margin-bottom: 16px; }
    .style-btn { flex: 1; text-align: center; padding: 14px 0; font-size: 15px; font-weight: 900; color: var(--text-sub); background: var(--input-bg); border-radius: 14px; border: 1px solid var(--border-color); cursor: pointer; }
    .style-desc-box { background: #FDF4F8; border-left: 5px solid #EC4899; padding: 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; color: #7A666B; font-weight: bold; margin-bottom: 20px; }
    .c-tag { background: #FDF2F8; color: #DB2777; border: 1px solid #FBCFE8; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
  </style>
</head>
<body>

  <!-- ラジオボタン群 -->
  <input type="radio" name="nav" id="nav-create" class="ui-state" checked>
  <input type="radio" name="nav" id="nav-data" class="ui-state">
  <input type="radio" name="nav" id="nav-settings" class="ui-state">
  <input type="radio" name="mode" id="mode-text" class="ui-state" checked onchange="updateChips()">
  <input type="radio" name="mode" id="mode-photo" class="ui-state" onchange="updateChips()">
  <input type="radio" name="style" id="style-cute" class="ui-state" checked>
  <input type="radio" name="style" id="style-custom" class="ui-state">
  <input type="radio" name="style" id="style-neat" class="ui-state">

  <!-- 初期設定モーダル -->
  <div id="setupModal" class="modal-overlay">
    <div class="modal-content" style="text-align: center;">
      <h2 style="margin: 0 0 10px; font-weight: 900;">🎉 初期設定</h2>
      <p style="color:var(--text-sub); font-size:14px; font-weight:bold; margin-bottom:24px;">あなたに最適な日記を作るため、<br>現在の業態を教えてください。</p>
      <select id="initialBusinessType" class="input-field" style="margin-bottom: 24px; font-weight:bold; text-align:center;">
        <option value="cabaret">キャバクラ・ラウンジ</option>
        <option value="fuzoku">風俗・メンエス</option>
        <option value="host">ホストクラブ</option>
      </select>
      <button onclick="saveInitialSetup()" style="width:100%; background:var(--primary-gradient); color:#FFF; border:none; padding:18px; border-radius:30px; font-weight:900; font-size:16px;">はじめる ✨</button>
    </div>
  </div>

  <!-- スタイル設定モーダル -->
  <div id="styleModal" class="modal-overlay">
    <div class="modal-content">
      <h2 style="margin: 0 0 20px; font-weight: 900; text-align: center;">🎨 AI口調・スタイル設定</h2>
      <div class="style-selector">
        <label for="style-cute" class="style-btn btn-cute">かわいい</label>
        <label for="style-custom" class="style-btn btn-custom">カスタム</label>
        <label for="style-neat" class="style-btn btn-neat">清楚</label>
      </div>
      <div class="style-desc-cute style-desc-box">🎀 可愛らしく、絵文字を多用した親しみやすい文体。</div>
      <div class="style-desc-neat style-desc-box">💎 上品で丁寧な言葉遣い。落ち着いた大人っぽい文体。</div>
      <div class="style-desc-custom">
        <div class="style-desc-box">⚙️ 過去の文章を貼り付けると、AIがあなたの口調を学習します。</div>
        <textarea id="customStyleText" class="input-field" placeholder="学習用の過去の文章をここにペースト..." style="height: 120px; margin-bottom:20px;"></textarea>
        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: var(--text-sub); margin-bottom: 12px;"><span>テンション（低）</span><span>（高）</span></div>
        <input type="range" id="tensionSlider" min="1" max="5" value="3" style="width:100%; margin-bottom:24px;">
        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: var(--text-sub); margin-bottom: 12px;"><span>絵文字の量（少）</span><span>（多）</span></div>
        <input type="range" id="emojiSlider" min="1" max="5" value="4" style="width:100%; margin-bottom:24px;">
      </div>
      <button onclick="closeStyleModal()" style="width:100%; background:var(--text-main); color:#FFF; border:none; padding:16px; border-radius:30px; font-weight:900; font-size:16px;">設定を保存して閉じる</button>
    </div>
  </div>

  <div class="app-container">
    <header class="header-area">
      <div class="app-title">AIお礼日記メーカー</div>
      <div class="toggle-container header-toggle">
        <label for="mode-text" class="toggle-label toggle-text">💌 お礼日記</label>
        <label for="mode-photo" class="toggle-label toggle-photo">📸 写メ日記</label>
      </div>
    </header>

    <main class="scroll-area">
      <!-- 作成タブ -->
      <div class="page page-create">
        <div class="card customer-select-card">
          <span class="label">👤 誰に送る？</span>
          <div class="stories-scroll" id="quickAccessArea"></div>
          <input type="text" id="nameInput" class="input-field" placeholder="名前を入力..." oninput="suggestCustomer()">
          <div id="resultArea" class="result-box"></div>
        </div>

        <div class="card mode-photo-ui">
          <span class="label">📷 写真を選ぶ</span>
          <input type="file" id="photoUpload" accept="image/*" style="display: none;" onchange="previewPhoto(event)">
          <label for="photoUpload" class="upload-area" id="uploadArea">
            <div id="uploadText">📸<br><br>タップして写真をアップロード</div>
            <img id="photoPreview">
          </label>
        </div>

        <div class="card">
          <span class="label">📝 エピソード・キーワード</span>
          <div class="textarea-wrapper">
            <textarea id="episodeInput" class="input-field"></textarea>
            <div class="mic-btn" onclick="startDictation()">🎤</div>
          </div>
          <div class="chip-container" id="dynamicChips"></div>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <input type="text" id="customTagInput" placeholder="＋タグ追加" style="flex:1; border:none; background:var(--input-bg); padding:10px; border-radius:10px;">
            <button onclick="addCustomTag()" style="background:var(--active-color); color:#fff; border:none; padding:0 15px; border-radius:10px;">追加</button>
          </div>
        </div>
      </div>

      <!-- 顧客タブ -->
      <div class="page page-data">
        <h2 style="margin:0 0 20px; font-weight:900;">顧客カルテ</h2>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="customerSearch" class="input-field" placeholder="名前で検索..." oninput="filterCustomerList()">
        </div>
        <div id="customerListArea"></div>
      </div>

      <!-- 設定タブ -->
      <div class="page page-settings">
        <h2 style="margin:0 0 20px; font-weight:900;">設定</h2>
        <div class="card" onclick="openStyleModal()" style="cursor:pointer; border: 2px solid #FBCFE8;">
          <span style="font-weight:900; color:#DB2777;">🎨 AIの口調・スタイル設定</span>
          <p style="font-size:12px; color:var(--text-sub); margin-top:5px;">かわいい・清楚・オリジナル学習</p>
        </div>
        <div class="settings-list">
          <div class="settings-item">
            <span>🏢 業態設定</span>
            <select class="input-field" id="businessType" onchange="updateChipsAndSave()" style="width:auto; padding:5px;">
              <option value="cabaret">キャバクラ</option>
              <option value="fuzoku">風俗・メンエス</option>
              <option value="host">ホスト</option>
            </select>
          </div>
        </div>
      </div>
    </main>

    <footer class="fixed-footer">
      <div class="submit-area">
        <button class="submit-btn" id="submitBtn" onclick="generateDiary()">✨ AIで作成する</button>
      </div>
      <nav class="bottom-nav">
        <label for="nav-create" class="nav-item tab-create"><span class="nav-icon">📝</span>作成</label>
        <label for="nav-data" class="nav-item tab-data"><span class="nav-icon">📖</span>顧客</label>
        <label for="nav-settings" class="nav-item tab-settings"><span class="nav-icon">⚙️</span>設定</label>
      </nav>
    </footer>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = "2009843865-hghVLuaS";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyWcx1XN8MuLsscHjoi9DdItYm7jCsMdZvNgrohG0o51KlTEheIXVdrHbSmGeSS2FV2/exec";

    let userId = "test-user";
    let customerData = [];
    let activeTags = [];
    let currentBase64Image = null;

    // --- 業種ごとのハードコード設定（ここを編集！） ---
    const industryConfigs = {
      cabaret: {
        prompt: "あなたは歌舞伎町の人気キャバ嬢です。お客様がまた会いに来たくなるような、甘え上手で華やかなお礼を送ってください。",
        tags: ['✨ 本指名', '🥂 同伴', '🍾 シャンパン', '💕 祝・開店', '🥺 会いたい']
      },
      fuzoku: {
        prompt: "あなたはサービス精神旺盛なセラピストです。お客様との親密な時間を大切にし、少し色っぽく、癒やしを与える文章を書いてください。",
        tags: ['✨ 本指名', '🏩 ロング', '🔞 濃厚', '🧴 メンエス', '🧸 癒やし']
      },
      host: {
        prompt: "あなたはカリスマホストです。姫が自分だけが特別だと感じるような、情熱的で独占欲を煽るメッセージを書いてください。",
        tags: ['🍾 オリシャン', '🎤 ラスソン', '🥂 アフター', '💸 エース', '👑 枕']
      }
    };
    const photoChips = ['📸 日常', '💄 出勤前', '👙 えちえち', '🥱 待機中', '👗 新衣装'];

    // --- 初期化 ---
    async function init() {
      // URLパラメータのチェック（リッチメニュー連携）
      const params = new URLSearchParams(window.location.search);
      if (params.get('page')) document.getElementById('nav-' + params.get('page')).checked = true;
      if (params.get('mode')) document.getElementById('mode-' + params.get('mode')).checked = true;
      if (params.get('action') === 'style') openStyleModal();

      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          userId = profile.userId;
        }
      } catch (e) { console.log("LIFF Init Error"); }

      const savedType = localStorage.getItem('businessType');
      if (!savedType) {
        document.getElementById('setupModal').style.display = 'flex';
      } else {
        document.getElementById('businessType').value = savedType;
      }
      
      // ★重要：ここで保存されたタグを読み込み表示する
      updateChips(); 
      fetchCustomers();
    }
    window.onload = init;

    function saveInitialSetup() {
      const type = document.getElementById('initialBusinessType').value;
      localStorage.setItem('businessType', type);
      document.getElementById('businessType').value = type;
      updateChips();
      document.getElementById('setupModal').style.display = 'none';
    }

    // --- タグ永続化ロジック ---
    function updateChips() {
      const type = localStorage.getItem('businessType') || 'cabaret';
      const isPhoto = document.getElementById('mode-photo').checked;
      const storageKey = isPhoto ? 'customTags_photo' : `customTags_${type}`;
      
      const savedTags = localStorage.getItem(storageKey);
      if (savedTags) {
        activeTags = JSON.parse(savedTags);
      } else {
        activeTags = isPhoto ? [...photoChips] : [...industryConfigs[type].tags];
      }

      document.getElementById('episodeInput').placeholder = isPhoto ? "えちえちな日常などを入力！" : "今日あったことを入力！";
      renderChips();
    }

    function renderChips() {
      const container = document.getElementById('dynamicChips');
      container.innerHTML = '';
      activeTags.forEach((text, index) => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `${text} <span style="color:#CCC; margin-left:4px;" onclick="removeTag(event, ${index})">×</span>`;
        chip.onclick = (e) => {
          if (e.target.tagName === 'SPAN') return;
          const ep = document.getElementById('episodeInput');
          ep.value += (ep.value ? " " : "") + text;
        };
        container.appendChild(chip);
      });
    }

    function saveTagsToStorage() {
      const type = localStorage.getItem('businessType') || 'cabaret';
      const isPhoto = document.getElementById('mode-photo').checked;
      const storageKey = isPhoto ? 'customTags_photo' : `customTags_${type}`;
      localStorage.setItem(storageKey, JSON.stringify(activeTags));
    }

    function addCustomTag() {
      const input = document.getElementById('customTagInput');
      if(input.value.trim() !== "") {
        activeTags.push(input.value.trim());
        input.value = "";
        renderChips();
        saveTagsToStorage();
      }
    }
    
    function removeTag(event, index) {
      event.stopPropagation();
      activeTags.splice(index, 1);
      renderChips();
      saveTagsToStorage();
    }

    function updateChipsAndSave() {
      localStorage.setItem('businessType', document.getElementById('businessType').value);
      updateChips();
    }

    // --- 顧客データ ---
    async function fetchCustomers() {
      try {
        const res = await fetch(GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "getCustomers", userId: userId })
        });
        const data = await res.json();
        customerData = data.success ? data.customers : [];
        renderCustomerList();
        renderQuickAccess();
      } catch (e) { renderQuickAccess(); }
    }

    function renderQuickAccess() {
      const area = document.getElementById('quickAccessArea');
      area.innerHTML = "";
      customerData.slice(0, 10).forEach(c => {
        area.innerHTML += `
          <div class="story-item" onclick="selectCustomer('${c.name}', '${c.memo}')">
            <div class="story-ring"><div class="story-inner">${c.name[0]}</div></div>
            <span class="story-name">${c.name}</span>
          </div>`;
      });
    }

    function renderCustomerList(filterText = "") {
      const area = document.getElementById('customerListArea');
      area.innerHTML = "";
      customerData.filter(c => c.name.includes(filterText)).forEach(c => {
        area.innerHTML += `<div class="card" onclick="selectCustomer('${c.name}', '${c.memo}')"><b>${c.name}</b><br><small>${c.memo}</small></div>`;
      });
    }

    function selectCustomer(name, memo) {
      document.getElementById('nav-create').checked = true;
      document.getElementById('nameInput').value = name;
      document.getElementById('episodeInput').value += memo ? `\n[メモ: ${memo}]` : "";
    }

    function suggestCustomer() {
      const text = document.getElementById('nameInput').value;
      const area = document.getElementById('resultArea');
      area.innerHTML = "";
      if (!text) { area.style.display = "none"; return; }
      const filtered = customerData.filter(c => c.name.includes(text));
      if (filtered.length > 0) {
        area.style.display = "block";
        filtered.forEach(c => {
          const div = document.createElement('div');
          div.className = "suggest-item";
          div.innerText = c.name;
          div.onclick = () => { selectCustomer(c.name, c.memo); area.style.display = "none"; };
          area.appendChild(div);
        });
      }
    }

    function previewPhoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        currentBase64Image = e.target.result;
        document.getElementById('photoPreview').src = e.target.result;
        document.getElementById('photoPreview').style.display = 'block';
        document.getElementById('uploadText').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    function openStyleModal() { document.getElementById('styleModal').style.display = 'flex'; }
    function closeStyleModal() { document.getElementById('styleModal').style.display = 'none'; }

    // --- 送信 ---
    async function generateDiary() {
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('nameInput').value;
      const episode = document.getElementById('episodeInput').value;
      const isPhoto = document.getElementById('mode-photo').checked;
      const type = localStorage.getItem('businessType') || 'cabaret';

      if (!isPhoto && !name) return alert("名前を入れてね");
      if (!episode) return alert("内容を入れてね");

      btn.innerText = "作成中...🚀"; btn.disabled = true;

      const payload = {
        action: "generate",
        userId: userId,
        name: name,
        episode: episode,
        style: document.querySelector('input[name="style"]:checked').id.replace('style-', ''),
        tension: document.getElementById('tensionSlider').value,
        emoji: document.getElementById('emojiSlider').value,
        customText: document.getElementById('customStyleText').value,
        industryPrompt: industryConfigs[type].prompt, // ★業種ごとのプロンプトを送信
        image: currentBase64Image // ★Vision用
      };

      try {
        const res = await fetch(GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
        if ((await res.json()).success) {
          alert("送信完了！LINEを見てね");
          liff.closeWindow();
        }
      } catch (e) { alert("エラーだよ"); }
      btn.innerText = "✨ AIで作成する"; btn.disabled = false;
    }

    function startDictation() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) return alert("未対応ブラウザです");
      const rec = new Speech(); rec.lang = 'ja-JP'; rec.start();
      rec.onresult = e => { document.getElementById('episodeInput').value += e.results[0][0].transcript; };
    }
  </script>
</body>
</html>
